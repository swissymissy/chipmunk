<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chipmunk - Check In</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>Chipmunk</h1>

    <!-- Log in form -->
    <div id="login-section">
        <h2>Log in to checkin</h2>
        <div id="error-msg"></div>
        <form id="login-form">
            <label for="email">Email</label>
            <input type="email" id="email" required>

            <label for="password">Password</label>
            <input type="password" id="password" required>

            <button type="submit">Log in</button>
        </form>
        <p>No account? <a href="/register.html">Register</a></p>
    </div>

    <!-- Getting student's location -->
    <div id="loading-section" style="display: none;">
        <h2 id="greeting"></h2>
        <p>Getting your location for checking in...</p>
    </div>

    <!-- Success -->
    <div id="success-section" style="display: none;">
        <h2>You've checked in!</h2>
        <p id="checkin-time"></p>
    </div>

    <!-- Error -->
    <div id="checkin-error-section" style="display: none;">
        <p id="checkin-error-msg"></p>
        <p>Please scan the QR code again.</p>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/checkin.js"></script>
</body>
</html>
